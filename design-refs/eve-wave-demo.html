<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eve Avatar Wave Animation Test</title>
  <style>
    :root {
      --avatar-wave-delay: 900ms;
      --avatar-wave-duration: 1.6s;
      --theme-accent: #243149;
    }
    body {
      margin: 0; padding: 40px;
      background: #FAFAF6;
      font-family: system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: flex-start; gap: 24px;
    }
    h1 { font-size: 16px; color: #333; margin: 0; }
    .label { font-size: 12px; color: #666; }

    /* Avatar-Container — KEIN overflow:hidden, kein border-radius clip */
    .eve-sheet-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--theme-accent) 13%, #FAFAF6);
      border: none;
      display: grid; place-items: center;
      color: var(--theme-accent);
      flex-shrink: 0;
    }
    .eve-sheet-avatar svg {
      width: 38px; height: 38px;
      overflow: visible;
    }

    /* Pivot — immer gesetzt (PFLICHT für iOS Safari transform-box) */
    .wave-hand {
      transform-box: fill-box;
      transform-origin: 12% 96%;
    }

    /* Wink-Animation */
    @media (prefers-reduced-motion: no-preference) {
      .eve-sheet-avatar.waving .wave-hand {
        animation: eve-wave var(--avatar-wave-duration, 1.6s) ease-in-out
                   var(--avatar-wave-delay, 900ms) 2 both;
      }
    }
    @keyframes eve-wave {
      0%, 100% { transform: rotate(0deg);   }
      20%      { transform: rotate(14deg);  }
      45%      { transform: rotate(-12deg); }
      70%      { transform: rotate(9deg);   }
    }

    /* Größere Vorschau */
    .large .eve-sheet-avatar { width: 80px; height: 80px; }
    .large .eve-sheet-avatar svg { width: 74px; height: 74px; }

    #trigger {
      padding: 10px 20px;
      background: var(--theme-accent);
      color: white; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer;
    }
    #status { font-size: 13px; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h1>Eve Avatar — Wink-Animation Test (Drei-Finger-Hand)</h1>
  <div class="label">
    delay: <b>900ms</b> &nbsp;|&nbsp;
    duration: <b>1.6s × 2 Zyklen</b> &nbsp;|&nbsp;
    pivot: <b>transform-box:fill-box 12% 96%</b> &nbsp;|&nbsp;
    overflow: <b>visible</b>
  </div>

  <div style="display:flex;gap:32px;align-items:center">
    <div>
      <div class="label" style="margin-bottom:8px">40px (real)</div>
      <div class="eve-sheet-avatar" id="avatar-sm">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <defs><clipPath id="eve-fr-sm"><circle cx="24" cy="24" r="21.5"/></clipPath></defs>
          <path d="M42.8 13.6 A21.5 21.5 0 1 1 36.6 6.6" stroke-width="2"/>
          <circle cx="24" cy="10.8" r="2.6"/>
          <circle cx="24" cy="20" r="7"/>
          <path d="M19.9 19 C20.6 17.7 22.2 17.7 22.9 19" stroke-width="1.8"/>
          <path d="M25.1 19 C25.8 17.7 27.4 17.7 28.1 19" stroke-width="1.8"/>
          <path d="M21.3 22 C22.5 24 25.5 24 26.7 22" stroke-width="1.9"/>
          <g clip-path="url(#eve-fr-sm)"><path d="M8.5 40 C10 32.5 16.5 29.5 24 29.5 C31.5 29.5 38 32.5 39.5 40"/></g>
          <path d="M19.5 30.5 L24 36.5 L28.5 30.5"/>
          <path d="M31.2 30.3 C34.8 27.4 36.9 23 38 13.8"/>
          <g class="wave-hand">
            <g transform="translate(38 13) rotate(32)">
              <path d="M-4.2 -0.2 L-4.2 -2.0 C-6.2 -2.5 -7.0 -4.2 -6.0 -5.2 C-5.3 -5.9 -4.4 -5.5 -4.2 -4.4 L-4.2 -6.8 A1.4 1.4 0 0 1 -1.4 -6.8 L-1.4 -5.2 L-1.4 -7.8 A1.4 1.4 0 0 1 1.4 -7.8 L1.4 -5.2 L1.4 -6.4 A1.4 1.4 0 0 1 4.2 -6.4 L4.2 -0.2 Z" stroke-width="1.9"/>
            </g>
          </g>
        </svg>
      </div>
    </div>

    <div class="large">
      <div class="label" style="margin-bottom:8px">80px (2× Zoom für Screenshots)</div>
      <div class="eve-sheet-avatar" id="avatar-lg">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <defs><clipPath id="eve-fr-lg"><circle cx="24" cy="24" r="21.5"/></clipPath></defs>
          <path d="M42.8 13.6 A21.5 21.5 0 1 1 36.6 6.6" stroke-width="2"/>
          <circle cx="24" cy="10.8" r="2.6"/>
          <circle cx="24" cy="20" r="7"/>
          <path d="M19.9 19 C20.6 17.7 22.2 17.7 22.9 19" stroke-width="1.8"/>
          <path d="M25.1 19 C25.8 17.7 27.4 17.7 28.1 19" stroke-width="1.8"/>
          <path d="M21.3 22 C22.5 24 25.5 24 26.7 22" stroke-width="1.9"/>
          <g clip-path="url(#eve-fr-lg)"><path d="M8.5 40 C10 32.5 16.5 29.5 24 29.5 C31.5 29.5 38 32.5 39.5 40"/></g>
          <path d="M19.5 30.5 L24 36.5 L28.5 30.5"/>
          <path d="M31.2 30.3 C34.8 27.4 36.9 23 38 13.8"/>
          <g class="wave-hand">
            <g transform="translate(38 13) rotate(32)">
              <path d="M-4.2 -0.2 L-4.2 -2.0 C-6.2 -2.5 -7.0 -4.2 -6.0 -5.2 C-5.3 -5.9 -4.4 -5.5 -4.2 -4.4 L-4.2 -6.8 A1.4 1.4 0 0 1 -1.4 -6.8 L-1.4 -5.2 L-1.4 -7.8 A1.4 1.4 0 0 1 1.4 -7.8 L1.4 -5.2 L1.4 -6.4 A1.4 1.4 0 0 1 4.2 -6.4 L4.2 -0.2 Z" stroke-width="1.9"/>
            </g>
          </g>
        </svg>
      </div>
    </div>
  </div>

  <button id="trigger">▶ Trigger (simuliert Sheet-Öffnen)</button>
  <div id="status">bereit</div>

  <script>
    const btn = document.getElementById('trigger');
    const avatarSm = document.getElementById('avatar-sm');
    const avatarLg = document.getElementById('avatar-lg');
    const status = document.getElementById('status');
    let startTime;

    btn.addEventListener('click', () => {
      avatarSm.classList.remove('waving');
      avatarLg.classList.remove('waving');
      void avatarSm.offsetWidth;
      startTime = Date.now();
      status.textContent = `t=0ms — eveOpen=true, class gesetzt in 50ms`;
      setTimeout(() => {
        avatarSm.classList.add('waving');
        avatarLg.classList.add('waving');
        status.textContent = `t=50ms — waving GESETZT, CSS delay 900ms läuft...`;
        setTimeout(() => {
          avatarSm.classList.remove('waving');
          avatarLg.classList.remove('waving');
          status.textContent = `t=${Date.now() - startTime}ms — waving ENTFERNT (re-triggerable)`;
        }, 4500);
      }, 50);
    });
  </script>
</body>
</html>
