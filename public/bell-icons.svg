<!--
  Bell — die retaha hotel Maskottchen-Form
  Geometrisch, Bauhaus, warmherzig durch Haltung

  8 Zustände, jeweils mit viewBox 0 0 120 140 (skalierbar)

  Verwendung in Astro:
    <Bell state="resting" />
    <Bell state="ringing" size="lg" color="bone" />

  Color-Tokens:
    --bell-color: #8C2128 (Burgund — Default)
    Andere Modi: #FAF8F2 (Bone, für dunkle Hintergründe), #1A1A1A (Anthrazit)

  Stand: 24.05.2026
-->

<!-- 1. RESTING — Standard, Standby, Default -->
<svg id="bell-resting" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <title>Bell — ruht</title>
  <path d="M 30 95 Q 30 25, 60 25 Q 90 25, 90 95 L 30 95 Z"/>
  <rect x="20" y="95" width="80" height="8"/>
  <rect x="56" y="12" width="8" height="13"/>
  <circle cx="60" cy="9" r="4"/>
</svg>

<!-- 2. RINGING — Aktion, Service-Ruf, Notification -->
<svg id="bell-ringing" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <title>Bell — klingelt</title>
  <g transform="rotate(-8 60 65)">
    <path d="M 30 95 Q 30 25, 60 25 Q 90 25, 90 95 L 30 95 Z"/>
    <rect x="20" y="95" width="80" height="8"/>
    <rect x="56" y="12" width="8" height="13"/>
    <circle cx="60" cy="9" r="4"/>
  </g>
  <path d="M 16 60 Q 6 60, 10 50" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <path d="M 104 60 Q 114 60, 110 50" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
</svg>

<!-- 3. WAITING — Andere Seite geneigt, aufmerksam wartend -->
<svg id="bell-waiting" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <title>Bell — wartet</title>
  <g transform="rotate(8 60 65)">
    <path d="M 30 95 Q 30 25, 60 25 Q 90 25, 90 95 L 30 95 Z"/>
    <rect x="20" y="95" width="80" height="8"/>
    <rect x="56" y="12" width="8" height="13"/>
    <circle cx="60" cy="9" r="4"/>
  </g>
</svg>

<!-- 4. SLEEPING — Gedämpfte Form, Nachts, Empty States -->
<svg id="bell-sleeping" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="currentColor" opacity="0.4">
  <title>Bell — schläft</title>
  <path d="M 30 95 Q 30 25, 60 25 Q 90 25, 90 95 L 30 95 Z"/>
  <rect x="20" y="95" width="80" height="8"/>
  <rect x="56" y="12" width="8" height="13"/>
  <circle cx="60" cy="9" r="4"/>
</svg>

<!-- 5. JOYFUL — Höher gestreckt, aufrecht, Erfolgs-State -->
<svg id="bell-joyful" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <title>Bell — freut sich</title>
  <path d="M 30 95 Q 30 18, 60 18 Q 90 18, 90 95 L 30 95 Z"/>
  <rect x="20" y="95" width="80" height="8"/>
  <rect x="56" y="5" width="8" height="13"/>
  <circle cx="60" cy="2" r="4"/>
</svg>

<!-- 6. READY — Etwas breiter, offen, Loading-State -->
<svg id="bell-ready" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <title>Bell — bereit</title>
  <path d="M 25 95 Q 22 28, 60 22 Q 98 28, 95 95 L 25 95 Z"/>
  <rect x="14" y="95" width="92" height="8"/>
  <rect x="56" y="9" width="8" height="13"/>
  <circle cx="60" cy="6" r="4"/>
</svg>

<!-- 7. DISCREET — Schmaler, Hintergrund-Status -->
<svg id="bell-discreet" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <title>Bell — diskret</title>
  <path d="M 38 95 Q 38 32, 60 28 Q 82 32, 82 95 L 38 95 Z"/>
  <rect x="30" y="95" width="60" height="8"/>
  <rect x="56" y="15" width="8" height="13"/>
  <circle cx="60" cy="12" r="4"/>
</svg>

<!-- 8. ALERT — Critical-State, Invertiert für dunkle Hintergründe -->
<!-- Form identisch zu resting, aber für Verwendung auf Anthrazit-BG mit Bone-Farbe -->
<svg id="bell-alert" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <title>Bell — Achtung</title>
  <path d="M 30 95 Q 30 25, 60 25 Q 90 25, 90 95 L 30 95 Z"/>
  <rect x="20" y="95" width="80" height="8"/>
  <rect x="56" y="12" width="8" height="13"/>
  <circle cx="60" cy="9" r="4"/>
  <!-- Subtle pulse-Indikator: zusätzlicher Ring außenherum -->
  <circle cx="60" cy="65" r="58" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
</svg>
